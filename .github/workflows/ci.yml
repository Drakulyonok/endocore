name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    # A real PostgreSQL server for tests/orm/test_postgres_pool.py — the pool
    # concurrency guarantees (pool_size > 1, aatomic(), UNIQUE races) only
    # mean something proven against a real server, not SQLite.
    # A real Redis server for the rate-limit concurrency test: the atomic
    # INCR guarantee that makes the Redis-backed limiter safe across worker
    # processes only means something proven against a real server too.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: endocore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENDOCORE_TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/endocore_test
      ENDOCORE_TEST_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[postgres,files,redis,celery,pydantic,watch]"
          pip install pytest
      - name: Test
        run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install endocore + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[postgres,files,redis,celery,pydantic,watch]"
          # Freeze endocore's actual dependency tree *before* installing the
          # scanners below, so pip-audit checks what ships with the package —
          # not bandit/pip-audit's own transitive deps sharing this venv.
          pip freeze --exclude-editable > /tmp/frozen-requirements.txt
      - name: Install security tools
        run: pip install bandit pip-audit
      # Every existing B608 finding here is a false positive (identifiers are
      # always quoted via backend.quote(), values are always bound
      # placeholders — see the # nosec annotations at each site) and every
      # B301/B403 is the HMAC-signed RedisCache pickle path; a *new* raw-SQL
      # or pickle finding elsewhere still fails this step.
      - name: Bandit (static analysis)
        run: bandit -r endocore/ -ll
      - name: pip-audit (dependency CVEs)
        run: pip-audit --desc -r /tmp/frozen-requirements.txt
