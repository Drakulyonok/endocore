name: Publish to PyPI

# Publishes on a version tag (e.g. v0.8.0b1) using an API token stored as the
# PYPI_API_TOKEN repo secret. Trusted Publishing (OIDC) was tried first but
# PyPI rejected it with `invalid-publisher` on both 0.7.0b2 and 0.8.0b1 (no
# matching publisher was ever registered on the project's PyPI settings) —
# a token is the one that has actually worked.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/endocore/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip twine
          twine upload dist/*
