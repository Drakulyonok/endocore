site_name: EndoCore
site_description: File-based ASGI backend framework — the folder tree is the API.
site_author: Drakulyonok
# mkdocs-static-i18n derives its language-switcher links from the *path*
# component of site_url. On Read the Docs that path is dynamic per version
# (/en/latest/, /en/v0.7.0b1/, ...) — a static value here would make the
# switcher link to a path that doesn't exist. RTD injects the real one via
# READTHEDOCS_CANONICAL_URL at build time; other builds (GitHub Pages, local
# `mkdocs serve`) fall back to the GitHub Pages project URL.
site_url: !ENV [READTHEDOCS_CANONICAL_URL, "https://drakulyonok.github.io/endocore/"]
repo_url: https://github.com/Drakulyonok/endocore
repo_name: Drakulyonok/endocore
copyright: Copyright &copy; 2026 Drakulyonok — MIT License

theme:
  name: material
  language: en
  logo: assets/avatar.svg
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/lang-redirect.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          site_description: Файловый ASGI backend-фреймворк — дерево папок и есть API.
          theme:
            language: ru
          nav_translations:
            Home: Главная
            Getting Started: Начало работы
            Guide: Руководство
            Extensions: Расширения
            Cookbook: Рецепты
            Examples: Примеры
            Deployment: Развёртывание
            Benchmarks: Бенчмарки
            API Reference: Справочник API
            Contributing: Участие в проекте
            Changelog: Changelog

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Drakulyonok/endocore
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/endocore/
    - icon: fontawesome/brands/discord
      link: https://discord.gg/jwvGj2M9EX

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/installation.md
      - getting-started/quickstart.md
      - getting-started/tutorial.md
      - getting-started/philosophy.md
  - Guide:
      - guide/architecture.md
      - guide/routing.md
      - guide/versioning.md
      - guide/request-response.md
      - guide/middleware.md
      - guide/dependency-injection.md
      - guide/configuration.md
      - guide/exceptions.md
      - guide/websockets.md
      - guide/cache.md
      - guide/background-lifecycle.md
      - guide/logging.md
      - guide/security.md
  - ORM:
      - orm/index.md
      - orm/models.md
      - orm/fields.md
      - orm/queries.md
      - orm/relations.md
      - orm/async.md
      - orm/migrations.md
      - orm/transactions.md
      - orm/files.md
  - Extensions:
      - extensions/index.md
      - extensions/redis.md
      - extensions/celery.md
      - extensions/email.md
  - CLI: cli.md
  - Cookbook: cookbook.md
  - Examples: examples.md
  - Deployment: deployment.md
  - Benchmarks: benchmarks.md
  - vs FastAPI: comparison.md
  - API Reference: reference.md
  - Contributing: contributing.md
  - Changelog: changelog.md
